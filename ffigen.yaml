name: DirPickerBindings
description: |
  Bindings for Darwin (iOS/macOS) `dir_picker_ffi.h`.

  Regenerate bindings with `dart run ffigen --config ffigen.yaml`.
output: 'lib/src/platforms/darwin/native.g.dart'
headers:
  entry-points:
    - 'darwin/dir_picker/Sources/dir_picker/include/dir_picker_ffi.h'
  include-directives:
    - 'darwin/dir_picker/Sources/dir_picker/include/dir_picker_ffi.h'
functions:
  include:
    - dir_picker_init_dart_api_dl
    - dir_picker_pick
preamble: |
  // ignore_for_file: always_specify_types
  // ignore_for_file: camel_case_types
  // ignore_for_file: non_constant_identifier_names
comments:
  style: any
  length: full
